version: "3.8"

# Все секреты и настройки — в файле .env рядом (см. .env.example).
# .env НЕ коммитится в git (закрыт через .gitignore).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: financebot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: finance
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./internal/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "127.0.0.1:5433:5432" # только локально, наружу не открываем

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://financebot:${POSTGRES_PASSWORD}@postgres:5432/finance
      # Часовой пояс бота: влияет на "сегодня" у ассистента, границы суток
      # в отчётах и разбор времени с чеков (банки печатают московское время).
      TZ: ${TZ:-Europe/Moscow}
      # Пусто/не задано => бот учитывает ВСЕ группы, в которых состоит номер.
      # Чтобы ограничить конкретными группами — перечисли JID через запятую:
      # WHATSAPP_GROUP_JIDS: "120363...1@g.us,120363...2@g.us"
      WHATSAPP_GROUP_JIDS: ${WHATSAPP_GROUP_JIDS:-}
      # Личный ассистент идёт через OpenRouter (OpenAI-совместимый API).
      # Пусто => бот не отвечает в личных сообщениях, вся остальная логика работает как обычно.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Модель "мозга" бота. По умолчанию — Opus 4.8 (самая умная: отчёты,
      # сверка, чтение чеков, цепочки инструментов). Промпт кэшируется, поэтому
      # повторные запросы дешевле. Варианты по убыванию силы/цены:
      #   anthropic/claude-opus-4.8      — максимум ума (рекомендую для денег)
      #   anthropic/claude-sonnet-4.6    — баланс цена/качество
      #   anthropic/claude-haiku-4.5     — самая дешёвая, для простых задач
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-opus-4.8}
      # Модель для ЧТЕНИЯ ЧЕКОВ (зрение). Пусто => та же, что и мозг (лучшее
      # распознавание). Хочешь удешевить распознавание, не трогая ум отчётов —
      # поставь дешёвую, напр. anthropic/claude-haiku-4.5.
      OPENROUTER_VISION_MODEL: ${OPENROUTER_VISION_MODEL:-}
      # Имя, по которому к боту обращаются в группах: "Джарвис скинь отчет"
      BOT_NAME: ${BOT_NAME:-Джарвис}
      # Кто может писать боту в личку (ассистент, дозагрузка чеков) — номера
      # через запятую без плюса: "79370000000,79280000000". Пусто = все.
      OWNER_NUMBERS: ${OWNER_NUMBERS:-}
      # Сверка чеков с программой рассрочек (cmf). Заведи в программе
      # отдельного пользователя для бота (права: клиенты/договоры/платежи —
      # просмотр по всем точкам) и укажи его логин/пароль. Пусто = выключено.
      CMF_API_URL: ${CMF_API_URL:-}
      CMF_EMAIL: ${CMF_EMAIL:-}
      CMF_PASSWORD: ${CMF_PASSWORD:-}
      # Через сколько часов напоминать о чеке, не внесённом в программу.
      CMF_REMIND_HOURS: ${CMF_REMIND_HOURS:-24}
      # Спрашивать в группе "чей это чек", если у чека нет ФИО клиента рядом.
      # Выключить: ASK_UNNAMED_RECEIPTS=0
      ASK_UNNAMED_RECEIPTS: ${ASK_UNNAMED_RECEIPTS:-1}
      # Читать фото-чеки СРАЗУ через Claude (глазами), а не полагаться на OCR —
      # заметно точнее (OCR по кириллице врёт). По умолчанию ВКЛючено.
      # Чтобы сэкономить на токенах (и вернуть OCR-first), поставь 0.
      # PDF с текстовым слоем это не затрагивает (там точный pdftotext).
      RECEIPT_VISION_FIRST: ${RECEIPT_VISION_FIRST:-1}
      # Кому доступна отчётность (сборы, суммы, отчёты, корректировки).
      # Остальным бот вежливо отказывает, но общается и ищет конкретные чеки.
      REPORT_ADMINS: ${REPORT_ADMINS:-89287836800,89899171578}
      OCR_PROVIDER: ${OCR_PROVIDER:-tesseract}
      YANDEX_OCR_API_KEY: ${YANDEX_OCR_API_KEY:-}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      WHATSAPP_PROXY: ${WHATSAPP_PROXY:-}
    volumes:
      - bot_data:/app/data
    # При первом запуске QR-код печатается в логи контейнера:
    #   docker compose logs -f bot   (или docker-compose на старых версиях)
    # его нужно отсканировать с телефона (WhatsApp -> Связанные устройства)

volumes:
  pg_data:
  bot_data:
